<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">用户登录</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2 th:text="${title}">用户登录</h2>
    <!-- 登录页面 -->
    <!-- 错误提示 -->
    <div th:if="${error}" class="error-message" th:text="${errorMsg}">
        用户名或密码错误
    </div>

    <!-- 成功提示 -->
    <div th:if="${success}" class="success-message" th:text="${successMsg}">
        注册成功，请登录
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>用户名：</label>
            <input type="text" name="username" placeholder="请输入用户名" required/>
        </div>
        <div class="form-group">
            <label>密码：</label>
            <input type="password" name="password" placeholder="请输入密码" required/>
        </div>
        <button type="submit" class="btn">登录</button>
    </form>

    <div class="links">
        <a th:href="@{/register}">还没有账号？立即注册</a>
    </div>
</div>
</body>
</html>
