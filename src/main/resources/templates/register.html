<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>用户注册</h2>
    <!-- 注册页面 -->
    <!-- 错误提示 -->
    <div th:if="${error}" class="error-message" th:text="${errorMsg}">
        注册失败
    </div>

    <form th:action="@{/register}" method="post">
        <div class="form-group">
            <label>用户名：</label>
            <input type="text" name="username" th:value="${username}" placeholder="请输入用户名" required/>
        </div>
        <div class="form-group">
            <label>真实姓名：</label>
            <input type="text" name="realName" th:value="${realName}" placeholder="请输入真实姓名" required/>
        </div>
        <div class="form-group">
            <label>密码：</label>
            <input type="password" name="password" placeholder="请输入密码" required/>
        </div>
        <div class="form-group">
            <label>确认密码：</label>
            <input type="password" name="confirmPassword" placeholder="请再次输入密码" required/>
        </div>
        <div class="form-group">
            <label>角色：</label>
            <select name="role" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:5px;">
                <option value="STUDENT">学生</option>
                <option value="TEACHER">教师</option>
            </select>
        </div>
        <div class="form-group">
            <label>手机号：</label>
            <input type="tel" name="phone" th:value="${phone}" placeholder="请输入手机号"/>
        </div>
        <div class="form-group">
            <label>邮箱：</label>
            <input type="email" name="email" th:value="${email}" placeholder="请输入邮箱"/>
        </div>
        <button type="submit" class="btn">注册</button>
    </form>

    <div class="links">
        <a th:href="@{/login}">已有账号？立即登录</a>
    </div>
</div>
</body>
</html>
